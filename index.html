<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仮説トラッカー プロトタイプ</title>
<style>
  :root{
    --bg:#eef0f2; --app:#f7f8f9; --card:#ffffff; --line:#e2e5e8; --line2:#cbd0d5;
    --ink:#1e2933; --ink2:#5a6672; --ink3:#8b95a1;
    --navy:#123a5e; --navy-bg:#e8eff5; --navy-tx:#123a5e;
    --amber-bg:#fbf0da; --amber-tx:#8a5a12;
    --green-bg:#e5f1df; --green-tx:#356124;
    --red-bg:#fbe6e4; --red-tx:#9c3329;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif; color:var(--ink); line-height:1.6;}
  .phone{max-width:430px; margin:0 auto; min-height:100vh; background:var(--app); position:relative; display:flex; flex-direction:column;}
  /* header */
  .top{position:sticky; top:0; z-index:20; background:var(--app); border-bottom:1px solid var(--line); padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;}
  .top h1{font-size:17px; font-weight:700; margin:0; letter-spacing:.01em;}
  .top .sub{font-size:11px; color:var(--ink3); font-weight:400;}
  .top .act{font-size:13px; color:var(--navy); font-weight:600; cursor:pointer; border:none; background:none;}
  /* scroll body */
  .body{flex:1; overflow-y:auto; padding:14px 16px 90px;}
  /* bottom tab */
  .tabbar{position:sticky; bottom:0; z-index:20; background:var(--card); border-top:1px solid var(--line); display:flex; padding:6px 4px 8px;}
  .tabbar button{flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px; cursor:pointer; color:var(--ink3); font-size:10px; font-weight:600;}
  .tabbar button.on{color:var(--navy);}
  .tabbar .ic{width:22px; height:22px; display:block;}
  /* components */
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:11px;}
  .card.tap{cursor:pointer;} .card.tap:active{background:#fafbfc;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .chip{display:inline-block; font-size:11px; font-weight:600; padding:2px 9px; border-radius:9px; white-space:nowrap;}
  .chip.navy{background:var(--navy-bg); color:var(--navy-tx);}
  .chip.amber{background:var(--amber-bg); color:var(--amber-tx);}
  .chip.green{background:var(--green-bg); color:var(--green-tx);}
  .chip.red{background:var(--red-bg); color:var(--red-tx);}
  .chip.gray{background:var(--bg); color:var(--ink2); border:1px solid var(--line);}
  .muted{color:var(--ink3); font-size:12px;}
  .lbl{font-size:11px; color:var(--ink3); font-weight:600; text-transform:none; letter-spacing:.02em; margin:16px 0 7px;}
  .lbl:first-child{margin-top:2px;}
  h2.blk{font-size:13px; font-weight:700; margin:0 0 3px;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; border:1px solid var(--line2); background:var(--card); color:var(--ink); border-radius:9px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; width:100%;}
  .btn:active{background:#f0f2f4;}
  .btn.pri{background:var(--navy); border-color:var(--navy); color:#fff;}
  .btn.sm{padding:7px 11px; font-size:12px; width:auto;}
  .btn.ghost{border-color:transparent; color:var(--ink3);}
  .btn.danger{color:var(--red-tx); border-color:var(--red-bg);}
  input,textarea,select{width:100%; border:1px solid var(--line2); border-radius:9px; padding:10px 12px; font-size:14px; font-family:inherit; color:var(--ink); background:var(--card); margin-top:4px;}
  textarea{resize:vertical; min-height:60px;}
  textarea.mono{font-family:var(--mono); font-size:12px; line-height:1.6;}
  label.fld{display:block; margin-bottom:11px;}
  label.fld .t{font-size:12px; color:var(--ink2); font-weight:600;}
  .seg{display:flex; border:1px solid var(--line2); border-radius:9px; overflow:hidden; margin-top:4px;}
  .seg button{flex:1; border:none; background:var(--card); padding:8px; font-size:13px; color:var(--ink2); cursor:pointer; font-family:inherit; font-weight:600;}
  .seg button.on{background:var(--navy); color:#fff;}
  table{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:4px;}
  th{text-align:left; font-size:10px; color:var(--ink3); font-weight:600; padding:4px 6px; border-bottom:1px solid var(--line);}
  td{padding:6px; border-bottom:1px solid var(--line); vertical-align:top; line-height:1.5;}
  .val-up{color:var(--green-tx); font-weight:700;}
  .val-dn{color:var(--red-tx); font-weight:700;}
  .val-old{color:var(--ink3); text-decoration:line-through;}
  tr.newrow td{background:var(--green-bg);}
  .metric{display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px;}
  .metric .m{background:var(--app); border:1px solid var(--line); border-radius:9px; padding:8px 9px;}
  .metric .m .k{font-size:10px; color:var(--ink3);}
  .metric .m .v{font-size:16px; font-weight:700; margin-top:1px;}
  .metric .m .d{font-size:9px; color:var(--ink3); margin-top:1px;}
  .metric .m.stale{background:var(--amber-bg); border-color:var(--amber-bg);}
  .metric .m.stale .k,.metric .m.stale .v,.metric .m.stale .d{color:var(--amber-tx);}
  .sec{border:1px solid var(--line); border-radius:9px; margin-bottom:7px; overflow:hidden;}
  .sec .h{display:flex; justify-content:space-between; align-items:center; padding:9px 11px; cursor:pointer; font-size:13px; font-weight:600; background:var(--card);}
  .sec .h .m{font-size:10px; color:var(--ink3); font-weight:400;}
  .sec .b{display:none; padding:0 11px 10px; font-size:13px; color:var(--ink2);}
  .sec.open .b{display:block;}
  .mine{border-left:3px solid var(--navy); background:var(--navy-bg); border-radius:0 8px 8px 0; padding:9px 11px; margin-top:4px;}
  .mine .row2{font-size:12px; color:var(--navy-tx);} .mine .ts{font-size:10px; color:var(--navy); opacity:.7;}
  .empty{text-align:center; padding:40px 20px; color:var(--ink3);}
  .empty .big{font-size:15px; font-weight:600; color:var(--ink2); margin-bottom:6px;}
  /* modal */
  .scrim{position:fixed; inset:0; background:rgba(20,30,40,.4); z-index:40; display:none; align-items:flex-end; justify-content:center;}
  .scrim.show{display:flex;}
  .sheet{background:var(--app); width:100%; max-width:430px; border-radius:18px 18px 0 0; padding:16px 16px 26px; max-height:88vh; overflow-y:auto;}
  .sheet h3{font-size:15px; font-weight:700; margin:2px 0 12px; text-align:center;}
  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:12.5px; padding:9px 16px; border-radius:20px; z-index:60; opacity:0; transition:opacity .2s; pointer-events:none; max-width:90%; text-align:center;}
  .toast.show{opacity:1;}
  .hint{font-size:11px; color:var(--ink3); margin-top:4px; line-height:1.5;}
  .failbox{background:var(--amber-bg); border-radius:9px; padding:9px 11px; margin-top:8px;}
  .failbox .t{font-size:12px; color:var(--amber-tx); font-weight:700;}
  .failbox .l{font-family:var(--mono); font-size:11px; color:var(--amber-tx); margin-top:3px; word-break:break-all;}
  .pill-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
  .banner{background:var(--navy-bg); border-radius:9px; padding:10px 12px; font-size:12px; color:var(--navy-tx); margin-bottom:11px; line-height:1.5;}
  .del{color:var(--red-tx); font-size:12px; cursor:pointer;}
  .clip3{display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; line-height:1.45;}
  .clip3.open{-webkit-line-clamp:unset; overflow:visible;}
  .dbody.open2{display:block !important;}
  .d-del{text-decoration:line-through; color:var(--ink3);}
  .d-add{color:#1257a8; font-weight:600;}
  .difflegend{font-size:10px; color:var(--ink3); margin:2px 0 6px;}
  .difflegend span{margin-right:9px;}
  .swipe{position:relative; overflow:hidden;}
  .swipe .del-btn{position:absolute; right:0; top:0; bottom:0; width:64px; background:var(--red-tx); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; border:none;}
</style>
</head>
<body>
<div class="phone">
  <div class="top">
    <div><h1 id="topTitle">ホーム</h1><div class="sub" id="topSub"></div></div>
    <button class="act" id="topAct" style="display:none"></button>
  </div>
  <div class="body" id="view"></div>
  <div class="tabbar">
    <button data-tab="home" class="on" onclick="go('home')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>ホーム</button>
    <button data-tab="analysis" onclick="go('analysis')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l3-4 3 2 4-6"/></svg>企業分析</button>
    <button data-tab="import" onclick="go('import')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 21h16"/></svg>AIに聞く</button>
    <button data-tab="reminder" onclick="go('reminder')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>リマインダー</button>
  </div>
</div>
<div class="scrim" id="scrim" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
//////////////////// storage & seed ////////////////////
const KEY='hypo_tracker_proto_v1';
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||null}catch(e){return null} }
function save(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
function seed(){
  return {
    metricsMaster:{
      snap:['PER(予想)','PBR','時価総額','配当利回り(予想)','信用倍率','目標株価コンセンサス'],
      trend:[{name:'売上高',graph:true},{name:'営業利益',graph:true},{name:'EPS',graph:true}]
    },
    sectionMaster:[
      {cat:'ビジネスモデル', on:true, subs:['収益モデル','顧客セグメント','提供価値','事業構造','収益の安定性']},
      {cat:'財務', on:true, subs:['実績財務(PL/BS/CF)','財務健全性・効率性']},
      {cat:'市場環境', on:true, subs:['市場規模(TAM/SAM/SOM)','市場成長率','産業構造','技術トレンド','マクロ要因']},
      {cat:'競争環境', on:true, subs:['主要競合','競争優位性・差別化']},
      {cat:'技術', on:true, subs:['技術力','技術ロードマップ','模倣困難性','生産・オペレーション技術','技術依存リスク','技術トレンド整合性']},
      {cat:'ガバナンス', on:false, subs:['経営陣の質','取締役会構成','インセンティブ設計','ESG']},
      {cat:'リスク要因', on:true, subs:['事業リスク','財務リスク','市場リスク','オペレーションリスク','法務リスク']},
      {cat:'株主還元', on:false, subs:['配当方針','自社株買い','総還元性向','資本政策']}
    ],
    askPrefs:{mode:'new', level:'標準', picks:{}, themes:{}},
    stocks:[
      {id:'5803', name:'フジクラ', code:'5803', kind:'保有',
       metrics:{'PER(予想)':{v:'36.2',unit:'',d:'2026/7/13',src:'銘柄スカウター',conf:'高'},
                'PBR':{v:'14.79',unit:'',d:'2026/7/13',src:'銘柄スカウター',conf:'高'},
                '時価総額':{v:'88883',unit:'百万円',d:'2026/7/13',src:'株予報Pro',conf:'高'},
                '信用倍率':{v:'23.41',unit:'',d:'2026/7/10',src:'株探',conf:'中'}},
       trend:{'売上高':{'25年3月期':'979375','26年3月期':'1182358','27年3月期(予)':'1462000',unit:'百万円'},
              '営業利益':{'25年3月期':'135519','26年3月期':'188707','27年3月期(予)':'310000',unit:'百万円'},
              'EPS':{'25年3月期':'55.1','26年3月期':'94.9','27年3月期(予)':'138.3',unit:'円'}},
       sections:{'事業構造':{t:'情報通信向け光ファイバ・ケーブル、自動車用電装品、電力ケーブルをグローバルに製造販売する非鉄メーカー。',d:'2026/7/13',src:'株予報Pro',details:[]},
                 '市場成長率':{t:'データセンター・5G向け光通信需要が拡大。AI・DCのCAPEX増が追い風。',d:'2026/7/13',src:'株予報Pro',details:[]},
                 '事業リスク':{t:'光ファイバ価格・原材料市況の変動、設備投資負担、為替・世界景気減速による需要調整。',d:'2026/7/13',src:'株予報Pro',details:[]},
                 '主要競合':{t:'古河電工、住友電工と光ケーブルで競合。DC向けで相対優位を主張。',d:'2026/7/13',src:'株予報Pro',details:[]}},
       mine:[{ts:'2026/7/12',t:'DC向け光ケーブルの需給が本丸。古河電工とのペアで見る。'}]
      }
    ],
    hypotheses:[
      {id:'h1', stockId:'5803', ver:2, text:'データセンター向け光ケーブル需要で高値更新が続く',
       points:['DC事業者のCAPEX拡大継続','情報通信セグメントの利益率改善','古河電工との相対強さ'],
       eventType:'date', eventDate:'2026/8/7', eventNote:'1Q決算', state:'検証待ち', judgeLog:[]}
    ],
    reminders:[
      {id:'r1', stockId:'5803', title:'フジクラ需給・AI関連ニュース監視', comment:'決算後の需給変化とAI・DC関連報道を毎日チェック',
       cat:'報道確認', freq:'平日', times:['09:15','15:30'], count:'60', paused:false,
       changes:[{cond:'1Q決算 2026/8/7 になったら', freq:'毎日', times:'08:30,12:30,18:00', count:'30'}],
       prompt:'フジクラ(5803)について、光ファイバ需給/AI・DC関連ニュース/信用残・出来高/同業(古河電工・住友電工)動向を重要度順に3〜6点で要約し、最後に注目度(高/中/低)を付けてください。',
       src:'GPT', srcDate:'2026/7/13', log:[{d:'2026/7/11',type:'変化なし'}], nextFire:'2026/7/14 09:15'}
    ]
  };
}
let DB = migrate(load()) || seed();
function migrate(db){
  if(!db) return null;
  const s0=seed();
  // 新フィールドの補完
  if(!db.sectionMaster) db.sectionMaster=s0.sectionMaster;
  if(!db.askPrefs) db.askPrefs={mode:'new', level:'標準', picks:{}, themes:{}};
  if(!db.askPrefs.themes) db.askPrefs.themes={};
  if(!db.metricsMaster) db.metricsMaster=s0.metricsMaster;
  // 旧セクション名 → 新体系サブ項目への読み替え
  const MAP={'事業・ビジネスモデル':'事業構造','成長ドライバー':'市場成長率','リスク要因':'事業リスク','競合ポジション':'主要競合','技術':'技術力'};
  (db.stocks||[]).forEach(st=>{
    if(!st.sections) st.sections={};
    Object.keys(st.sections).forEach(k=>{
      const v=st.sections[k];
      if(v===null){ delete st.sections[k]; return; }           // 旧「未取得」プレースホルダは削除
      if(MAP[k]){ const nk=MAP[k]; if(!st.sections[nk]) st.sections[nk]=v; delete st.sections[k]; }
      if(v&&!v.details) v.details=[];
    });
  });
  return db;
}

//////////////////// helpers ////////////////////
const $=(s,r=document)=>r.querySelector(s);
const el=(h)=>{const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild;};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){return new Date();}
function parseD(s){ if(!s)return null; const m=String(s).match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/); if(!m)return null; return new Date(+m[1],+m[2]-1,+m[3]); }
function daysSince(s){ const d=parseD(s); if(!d)return 999; return Math.floor((today()-d)/86400000); }
// 文字単位の差分(LCS)。長文はチャンク分割して計算量を抑える
function diffChars(a,b){
  a=String(a==null?'':a); b=String(b==null?'':b);
  const LIMIT=1200;
  if(a.length>LIMIT||b.length>LIMIT){ // 長すぎる場合は句読点単位で粗く比較
    const as=a.split(/(?<=[。、\n])/), bs=b.split(/(?<=[。、\n])/);
    return lcsDiff(as,bs);
  }
  return lcsDiff(a.split(''), b.split(''));
}
function lcsDiff(A,B){
  const n=A.length,m=B.length;
  const dp=Array.from({length:n+1},()=>new Uint16Array(m+1));
  for(let i=n-1;i>=0;i--) for(let j=m-1;j>=0;j--) dp[i][j]= A[i]===B[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  const out=[]; let i=0,j=0;
  while(i<n&&j<m){
    if(A[i]===B[j]){ out.push({t:'=',v:A[i]}); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]){ out.push({t:'-',v:A[i]}); i++; }
    else { out.push({t:'+',v:B[j]}); j++; }
  }
  while(i<n){ out.push({t:'-',v:A[i++]}); }
  while(j<m){ out.push({t:'+',v:B[j++]}); }
  // 連続する同種をまとめる
  const merged=[];
  out.forEach(o=>{ const last=merged[merged.length-1]; if(last&&last.t===o.t) last.v+=o.v; else merged.push({t:o.t,v:o.v}); });
  return merged;
}
// 更新前セル用: 削除された部分に取り消し線
function renderDiffBefore(diff){
  return diff.filter(d=>d.t!=='+').map(d=> d.t==='-' ? `<span class="d-del">${esc(d.v)}</span>` : esc(d.v)).join('');
}
// 更新後セル用: 追加された部分を青字
function renderDiffAfter(diff){
  return diff.filter(d=>d.t!=='-').map(d=> d.t==='+' ? `<span class="d-add">${esc(d.v)}</span>` : esc(d.v)).join('');
}
function showCell(td){ const d=td.querySelector('.clip3'); if(d) d.classList.toggle('open'); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function stock(id){return DB.stocks.find(s=>s.id===id);}
function hyposOf(id){return DB.hypotheses.filter(h=>h.stockId===id);}
function remOf(id){return DB.reminders.filter(r=>r.stockId===id);}
function staleCount(s){ let n=0; DB.metricsMaster.snap.forEach(k=>{const m=s.metrics[k]; if(!m) n++; else if(daysSince(m.d)>30) n++;}); Object.values(s.sections).forEach(v=>{ if(v&&daysSince(v.d)>90) n++; }); return n; }
function allSubs(){ const a=[]; DB.sectionMaster.forEach(c=>{ if(c.on) c.subs.forEach(su=>a.push({cat:c.cat,sub:su})); }); return a; }
function filledCatCount(s,cat){ const c=DB.sectionMaster.find(x=>x.cat===cat); if(!c)return 0; return c.subs.filter(su=>s.sections[su]).length; }

//////////////////// router ////////////////////
let STATE={tab:'home', stockId:null};
function go(tab){
  // タブから直接開いた場合、AIに聞く画面の対象銘柄をリセット(企業分析からの遷移時は openAsk が設定済み)
  if(tab==='import' && !STATE._askFromStock) STATE.askStockId=null;
  STATE._askFromStock=false;
  STATE.tab=tab; STATE.stockId=null;
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  render(); $('#view').scrollTop=0;
}
function openAsk(sid){ STATE.askStockId=sid; STATE._askFromStock=true; go('import'); }
function openStock(id){ STATE.stockId=id; render(); $('#view').scrollTop=0; }

function render(){
  const v=$('#view'); const act=$('#topAct'); act.style.display='none'; $('#topSub').textContent='';
  if(STATE.stockId){ renderStockDetail(v); return; }
  ({home:renderHome, analysis:renderAnalysis, import:renderImport, reminder:renderReminder}[STATE.tab])(v);
}

//////////////////// HOME ////////////////////
function renderHome(v){
  $('#topTitle').textContent='ホーム';
  const act=$('#topAct'); act.style.display='block'; act.textContent='⚙ バックアップ'; act.onclick=sheetBackup;
  const judge=DB.hypotheses.filter(h=>h.state==='判定待ち');

  if(judge.length) h+=`<div class="card tap" onclick="go('analysis')"><div class="row"><span class="chip amber">判定待ち ${judge.length}</span></div><div style="margin-top:5px;font-size:13px">${esc(judge[0].text)}</div></div>`;
  if(todayRem.length) h+=`<div class="card"><div class="row"><span class="chip navy">今日のリマインダー ${todayRem.length}</span><button class="btn sm pri" onclick="copyBrief()">☀ ブリーフをコピー</button></div><div style="margin-top:5px;font-size:13px">${esc(todayRem[0].title)} ほか</div></div>`;
  if(stale.length) h+=`<div class="card tap" onclick="go('analysis')"><div class="row"><span class="chip gray">鮮度切れ ${stale.length}銘柄</span></div><div class="muted" style="margin-top:4px">そろそろ更新: ${stale.map(s=>esc(s.name)).join('、')}</div></div>`;
  if(!risk.length&&!judge.length&&!todayRem.length&&!stale.length) h+='<div class="empty"><div class="big">対応が必要なことはありません</div><div>銘柄を分析するか、リマインダーを作りましょう。</div></div>';
  // timeline
  const items=[];
  DB.reminders.filter(r=>!r.paused&&r.nextFire).forEach(r=>{const d=parseD(r.nextFire); if(d)items.push({d,label:r.title,type:'リマインダー',id:r.stockId});});
  DB.hypotheses.forEach(hh=>{ if(hh.eventType==='date'&&hh.eventDate){const d=parseD(hh.eventDate); if(d)items.push({d,label:(stock(hh.stockId)?.name||'')+' '+(hh.eventNote||'検証イベント'),type:'検証イベント',id:hh.stockId});} });
  items.sort((a,b)=>a.d-b.d);
  h+='<div class="lbl">今週の予定</div>';
  if(!items.length) h+='<div class="muted">予定はありません</div>';
  items.slice(0,6).forEach(it=>{ const wd=['日','月','火','水','木','金','土'][it.d.getDay()];
    h+=`<div class="card tap" onclick="openStock('${it.id}')"><div class="row"><span style="font-size:13px;font-weight:600">${esc(it.label)}</span><span class="muted">${it.d.getMonth()+1}/${it.d.getDate()}(${wd})</span></div><div class="muted" style="margin-top:2px">${it.type}</div></div>`; });

}

function parseMd(text){
  // returns {stock:{name,code}, rows:[{block,key,value,d,src,conf,kind}], failed:[], type}
  const lines=text.split(/\r?\n/); let block=null; const rows=[]; const failed=[]; let stk=null; let type='analysis';
  for(let raw of lines){
    let line=raw.replace(/\*\*/g,'').trim();
    if(!line) continue;
    if(/^```/.test(line)) continue;                                  // コードブロック境界
    if(/^\[[0-9A-F-]{8,}\]\(https?:\/\//i.test(line)) continue;    // citationリンク行
    if(/^(PR TIMES|\+\d+)\s*`*$/i.test(line)) continue;            // 出典フッタ
    let m;
    if(m=line.match(/^#\s*銘柄[:：]\s*(.+?)\s*[\(（]([A-Za-z0-9]+)[\)）]/)){ stk={name:m[1].trim(),code:m[2].trim()}; continue; }
    if(m=line.match(/^##\s*(.+)$/)){ const b=m[1].trim(); block=b; if(/リマインダー/.test(b))type='reminder'; continue; }
    if(line.startsWith('#')) continue;
    if(/^[-•*・‣▪]\s*/.test(line)){
      let body=line.replace(/^[-•*・‣▪]\s*/,'');
      // key: value | d | src | conf   (labels like 出典: 確信度: tolerated)
      let km=body.match(/^([^:：]+)[:：]\s*(.*)$/);
      if(!km){ failed.push(raw.trim()); continue; }
      let key=km[1].trim(); let rest=km[2].trim();
      let parts=rest.split('|').map(x=>x.trim());
      let value=parts[0]||'';
      let d='',src='',conf='',unit='';
      parts.slice(1).forEach(p=>{
        if(/月期/.test(p)&&p.includes('=')){ value+=' | '+p; return; }
        p=p.replace(/^(出典|確信度|基準日|単位)[:：]\s*/,'');
        if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(p)||/^\d{1,2}\/\d{1,2}$/.test(p)) d=p;
        else if(/^(高|中|低)$/.test(p)) conf=p;
        else if(/^単位/.test(parts.find(x=>x.includes(p))||'')||/円|USD|ドル|\$|%/.test(p)&&p.length<8) unit=p.replace(/単位[:：]/,'');
        else src=src?src+' / '+p:p;
      });
      src=shortSrc(src);
      // 数値項目(指標・業績推移)のみ単位を正規化する。分析セクションの本文は一切加工しない。
      const isTrendRow = /[年][0-9]{1,2}月期/.test(value) && value.includes('=');
      const isAnalysisRow = /分析/.test(block||'') || /[（(](サマリ|要点のみ|詳細)[）)]/.test(key);
      if(isTrendRow){
        const segs=value.split('|').map(x=>x.trim()).filter(Boolean);
        const outs=[]; let segUnit='';
        segs.forEach(sg=>{ const mm=sg.split('='); if(mm.length!==2){outs.push(sg);return;}
          const nv=normalizeValueUnit(mm[1].trim(), '');
          if(nv.unit&&!segUnit) segUnit=nv.unit;
          outs.push(mm[0].trim()+'='+nv.v); });
        value=outs.join(' | ');
        if(segUnit&&(!unit||unit==='円')) unit=segUnit;
      } else if(!isAnalysisRow && isNumericValue(value)){
        const nv=normalizeValueUnit(value, unit);
        value=nv.v; if(nv.unit) unit=nv.unit;
      }
      // date-ok check
      if(d&&!parseD(d.length<=5?('2026/'+d):d) && !/^\d{1,2}\/\d{1,2}$/.test(d)){ /* keep */ }
      rows.push({block,key,value,d,src,conf,unit, raw:raw.trim()});
    } else { failed.push(raw.trim()); }
  }
  // 見出しが無い行の行き先をキーから推定(GPTの分割出力対策)
  rows.forEach(r=>{
    if(r.block) return;
    if(DB.metricsMaster.snap.includes(r.key)) r.block='指標';
    else if(/[年][0-9]{1,2}月期\s*(\(予\))?\s*=/.test(r.value)||/FY\d{2}\s*=/.test(r.value)) r.block='業績推移';
    else if(resolveSection(r.key,r.value).sub) r.block='分析';
  });
  // 重複除外(同じキーで同じ値が複数回=AIの再出力)
  const seen=new Set(); const dups=[];
  const uniq=rows.filter(r=>{ const sig=r.key+'|'+String(r.value).slice(0,80); if(seen.has(sig)){ dups.push(r); return false; } seen.add(sig); return true; });
  return {stock:stk, rows:uniq, failed, type, dups};
}
async function pasteFromClipboard(){
  const ta=$('#mdIn'); if(!ta) return;
  try{
    const txt=await navigator.clipboard.readText();
    if(!txt||!txt.trim()){ toast('クリップボードが空です'); return; }
    // 既に内容があれば追記(分割出力を続けて貼るケース)
    ta.value = ta.value.trim() ? (ta.value.replace(/\s+$/,'')+'\n\n'+txt) : txt;
    parseAndPreview();
    toast('貼り付けました');
  }catch(e){
    // 権限が無い/未対応の場合は手動ペーストへ誘導
    ta.focus();
    toast('端末の設定により自動貼り付けできません。入力欄を長押しして「ペースト」してください');
  }
}

function knownSubs(){ const a=[]; DB.sectionMaster.forEach(c=>c.subs.forEach(su=>a.push(su))); return a; }
// 「主要競合(サマリ)」「競争環境: 主要競合(サマリ)」「競争環境: 主要競合(詳細): 本文」いずれも解決する
function resolveSection(rawKey, rawValue){
  let key=String(rawKey||'').trim(), value=String(rawValue||'').trim();
  let layer=null;
  const pick=(s)=>{ const m=s.match(/^(.*?)[（(](サマリ|要点のみ|詳細)[）)]\s*$/); if(m) return {base:m[1].trim(), lay:(m[2]==='詳細'?'詳細':'サマリ')}; return null; };
  // ケースA: キー自体にレイヤー表記がある
  let p=pick(key);
  if(p){ key=p.base; layer=p.lay; }
  // ケースB: キーがカテゴリ名で、値の先頭が「サブ項目(レイヤー): 本文」
  const cats=DB.sectionMaster.map(c=>c.cat);
  if(cats.includes(key)){
    const m=value.match(/^([^:：]+)[:：]\s*([\s\S]*)$/);
    if(m){ const p2=pick(m[1].trim()); if(p2){ key=p2.base; layer=p2.lay; value=m[2].trim(); } else { key=m[1].trim(); value=m[2].trim(); } }
  }
  // キー内に「カテゴリ: サブ項目」が同居している場合
  if(key.includes(':')||key.includes('：')){
    const parts=key.split(/[:：]/).map(x=>x.trim()).filter(Boolean);
    const last=parts[parts.length-1]; const p3=pick(last);
    if(p3){ key=p3.base; layer=p3.lay; } else { key=last; }
  }
  const subs=knownSubs();
  if(!subs.includes(key)){
    const hit=subs.find(su=>key.includes(su)||su.includes(key));
    if(hit) key=hit; else return {sub:null, layer:layer||'サマリ', value};
  }
  return {sub:key, layer:layer||'サマリ', value};
}
function shortSrc(s){
  if(!s) return '';
  let x=String(s);
  x=x.replace(/\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/g, (m,label,url)=>{
    try{ const h=url.match(/^https?:\/\/([^\/\?]+)/); return (h?h[1].replace(/^www\./,''):(label||'')); }catch(e){ return label||''; }
  });
  x=x.replace(/https?:\/\/\S+/g,'').replace(/\s{2,}/g,' ').replace(/\s*\/\s*$/,'').trim();
  // 重複ドメインの除去
  const parts=[...new Set(x.split(/[\/、,]\s*/).map(y=>y.trim()).filter(Boolean))];
  x=parts.join(' / ');
  return x.length>40?x.slice(0,40)+'…':x;
}
// 値が「単独の数値(+単位)」に見えるか。文章は false。
function isNumericValue(v){
  const s=String(v).trim();
  if(s.length>24) return false;                       // 長い=文章
  if(/[。、！？]/.test(s)) return false;               // 句読点=文章
  if(/[ぁ-んァ-ヶ]{3,}/.test(s)) return false;         // かな連続=文章
  return /^[\-\d,.,]+\s*(兆|億|万)?\s*[\d,.]*\s*(億円|百万円|百万USD|万円|円|倍|%|USD|ドル|\$[BM]?)?\s*$/.test(s);
}
// 日本語の位取り単位を正規化: 「1兆3425億円」→ {v:13425, unit:'億円'} 等
function normalizeValueUnit(value, unit){
  if(!isNumericValue(value)) return {v:String(value), unit:String(unit||'')};   // 文章は加工しない
  let v=String(value).trim(); let u=String(unit||'').trim();
  const jp=v.match(/^([\d,\.]*)?\s*(兆)?\s*([\d,\.]+)?\s*(億|万)?\s*(円|USD|ドル)?\s*$/);
  if(/兆|億|万/.test(v)){
    let total=0; let m;
    if(m=v.match(/([\d,\.]+)\s*兆/)) total+=parseFloat(m[1].replace(/,/g,''))*10000;   // 兆→億換算
    if(m=v.match(/([\d,\.]+)\s*億/)) total+=parseFloat(m[1].replace(/,/g,''));
    if(total>0){ return {v:String(Math.round(total*100)/100), unit:'億円'}; }
  }
  const um=v.match(/^([\-\d,\.]+)\s*(億円|百万円|百万USD|万円|円|倍|%|USD|\$[BM]?)$/);
  if(um){ return {v:um[1].replace(/,/g,''), unit:um[2]}; }
  return {v:v.replace(/,/g,''), unit:u};
}
function normD(d){ if(!d)return '2026/7/13'; if(/^\d{1,2}\/\d{1,2}$/.test(d))return '2026/'+d; return d; }

    <div class="banner" style="margin-bottom:12px">登録後、「AIに聞く」で分析を集めます。<b>一度に聞く項目は5つまで</b>がおすすめです(多いとAIの回答が不安定になります)。あとから何度でも追加できます。</div>
    <label class="fld"><span class="t">銘柄名</span><input id="as_name" placeholder="例: 古河電気工業"></label>
    <label class="fld"><span class="t">ティッカー / 証券コード</span><input id="as_code" placeholder="例: 5801 / PLTR"></label>
    <label class="fld"><span class="t">区分</span><div class="seg"><button class="on" id="as_hold" onclick="this.classList.add('on');this.nextElementSibling.classList.remove('on')">保有</button><button id="as_watch" onclick="this.classList.add('on');this.previousElementSibling.classList.remove('on')">ウォッチ</button></div></label>
    <button class="btn pri" onclick="doAddStock(true)">追加してAIに聞く</button>
    <button class="btn" style="margin-top:8px" onclick="doAddStock(false)">追加のみ</button>`);
}
function doAddStock(order){
  const name=$('#as_name').value.trim(), code=$('#as_code').value.trim();
  if(!name||!code){toast('銘柄名とコードは必須です');return;}
  if(stock(code)){toast('このコードは登録済みです');return;}
  const kind=$('#as_hold').classList.contains('on')?'保有':'ウォッチ';
  DB.stocks.push({id:code,name,code,kind,metrics:{},trend:{},sections:{},mine:[]});
  save(); closeSheet(); 
  if(order){ openStock(code); sheetOrder(code); } else { openStock(code); }
  toast('追加しました');
}
function delDetail(sid,sec,idx){
  const s=stock(sid); const sc=s&&s.sections[sec]; if(!sc||!sc.details) return;
  const d=sc.details[idx]; if(!d) return;
  askConfirm({title:'詳細メモを削除', body:(d.title?d.title+'\n\n':'')+d.t.slice(0,120)+(d.t.length>120?'…':''), okLabel:'削除する', danger:true, onOk:()=>{
    sc.details.splice(idx,1); save(); render(); toast('詳細メモを削除しました');
  }});
}
function sheetAddDetail(sid,sec){
  openSheet(`<h3>${esc(sec)} の詳細</h3>
    <label class="fld"><span class="t">タイトル(任意)</span><input id="dt_title" placeholder="例: 光ファイバの技術優位性"></label>
    <label class="fld"><span class="t">内容(手書きでも、AIの深掘り回答の貼り付けでもOK)</span><textarea id="dt_t" style="min-height:180px"></textarea></label>
    <button class="btn sm" style="margin-bottom:10px" onclick="copyDeep('${sid}','${sec}')">深掘り質問文をコピー</button>
    <button class="btn pri" onclick="doAddDetail('${sid}','${sec}')">保存する</button>`);
}
function copyDeep(sid,sec){ const s=stock(sid); copy(s.name+'('+s.code+')の「'+sec+'」についてさらに深掘りして解説してください。前提: 私は個別株投資家で、投資判断に効く具体性(数値・競合比較・持続性)を重視します。装飾なしの文章で回答してください。','深掘り質問文をコピーしました'); }
function doAddDetail(sid,sec){ const t2=$('#dt_t').value.trim(); if(!t2){toast('内容を入力してください');return;} const s=stock(sid); if(!s.sections[sec]) s.sections[sec]={t:'(サマリ未取得)',d:fmtToday(),src:'—',details:[]}; if(!s.sections[sec].details) s.sections[sec].details=[]; s.sections[sec].details.unshift({ts:fmtToday(),title:$('#dt_title').value.trim(),t:t2}); save(); closeSheet(); render(); toast('詳細を保存しました'); }
function sheetAddMine(sid){
  openSheet(`<h3>見解を追記</h3><label class="fld"><span class="t">自分の判断・違和感・次に見るポイント</span><textarea id="mine_t" placeholder="AI分析とは分けて保存されます"></textarea></label><button class="btn pri" onclick="doAddMine('${sid}')">追記する</button>`);
}
function doAddMine(sid){ const t=$('#mine_t').value.trim(); if(!t){toast('内容を入力してください');return;} const s=stock(sid); s.mine.unshift({ts:fmtToday(),t}); save(); closeSheet(); render(); toast('見解を追記しました'); }
let currentSid=null;
function sheetOrder(sid){
  const p=DB.askPrefs||{mode:'new',level:'標準',picks:{}};
  openSheet(`<h3>AIに聞く</h3>
    <div class="muted" style="margin-bottom:12px">どちらの聞き方をしますか?</div>
    <div class="card tap ${p.mode==='new'?'':''}" style="${p.mode==='new'?'border-color:var(--navy);background:var(--navy-bg)':''}" onclick="pickMode('${sid}','new')">
      <div style="font-size:14px;font-weight:700">① 新規に調べる</div>
      <div class="muted" style="margin-top:3px">これから深掘りする。調べる項目を選んでAIに聞きます。</div></div>
    <div class="card tap" style="${p.mode==='org'?'border-color:var(--navy);background:var(--navy-bg)':''}" onclick="pickMode('${sid}','org')">
      <div style="font-size:14px;font-weight:700">② 手持ちの分析を整理する</div>
      <div class="muted" style="margin-top:3px">すでにAIと深掘り済み。手元の分析を指定した粒度で構造化し直します。</div></div>`);
}
function pickMode(sid,mode){ DB.askPrefs.mode=mode; save(); if(mode==='new') sheetOrderNew(sid); else sheetOrderOrg(sid); }

function sheetOrderNew(sid){
  const s=stock(sid); const pk=DB.askPrefs.picks||{};
  const th=(DB.askPrefs.themes||{})[sid]||'';
  const cnt=Object.values(pk).filter(x=>x&&x!=='off').length;
  const deepCnt=Object.values(pk).filter(x=>x==='deep').length;
  let h=`<h3>調べる項目を選ぶ</h3>
    <div class="banner" style="margin-bottom:10px">
      <b>一度に聞く項目は5つまでがおすすめです。</b><br>
      項目が多いとAIの回答が不安定になったり、分割出力されて取り込みにくくなります。<br>
      あとから何度でも追加で聞けるので、テーマを絞って少しずつ育てるのがおすすめです。
    </div>
    <label class="fld"><span class="t">深掘りテーマ(任意)</span>
      <input id="ord_theme" value="${esc(th)}" placeholder="例: AI・データセンター向け液冷技術">
      <div class="hint">入力すると、各項目をこのテーマの観点で調べます。</div></label>
    <div class="row" style="margin:10px 0 4px">
      <span class="muted">ボタンを押すたび 選択 → 要点のみ → 深掘り → 解除</span>
      <span class="chip ${cnt>5?'red':cnt?'navy':'gray'}">選択 ${cnt}</span>
    </div>
    ${cnt>5?`<div class="failbox" style="background:var(--amber-bg);margin-bottom:6px"><div class="t">⚠ 項目が多すぎます (${cnt}件)</div><div class="muted" style="font-size:11px;color:var(--amber-tx)">AIが分割出力する可能性が高く、書式も乱れやすくなります。5件以下に絞ることを強くおすすめします。${deepCnt>3?'<br>特に「深掘り」は文字数が多いため、3件以下が安全です。':''}</div></div>`:''}`;
  DB.sectionMaster.filter(c=>c.on).forEach((c,ci)=>{
    h+=`<div class="lbl" style="margin:12px 0 4px">${esc(c.cat)}</div>`;
    c.subs.forEach(su=>{ const st=pk[su]||'off';
      h+=`<div class="row" style="display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--line)">
        <span style="flex:1;font-size:13px">${esc(su)}${s.sections[su]?' <span class="chip gray" style="font-size:9px">取得済</span>':''}</span>
        <button class="btn sm" style="width:auto;padding:4px 9px;font-size:11px;${st!=='off'?'background:var(--navy);color:#fff;border-color:var(--navy)':''}" onclick="cyclePick('${sid}','${esc(su)}')">${st==='off'?'選択':st==='sum'?'要点のみ':'深掘り'}</button>
      </div>`; });
  });
  h+=`<button class="btn pri" style="margin-top:14px" onclick="saveTheme('${sid}');genOrderNew('${sid}')">この内容で質問文を生成</button>
      <button class="btn" style="margin-top:8px" onclick="saveTheme('${sid}');sheetSectionMaster('${sid}')">セクションを管理(表示/非表示)</button>`;
  openSheet(h);
}
function cyclePick(sid,su){ saveTheme(sid); const pk=DB.askPrefs.picks||(DB.askPrefs.picks={}); const cur=pk[su]||'off'; pk[su]= cur==='off'?'sum': cur==='sum'?'deep':'off'; save(); sheetOrderNew(sid); }
function saveTheme(sid){ const el=document.getElementById('ord_theme'); if(el){ if(!DB.askPrefs.themes)DB.askPrefs.themes={}; DB.askPrefs.themes[sid]=el.value.trim(); save(); } }

function sheetOrderOrg(sid){
  const lv=DB.askPrefs.level||'標準';
  const opts=[['要点のみ','サマリだけに凝縮。ざっと俯瞰したいとき。'],['標準','サマリ+主要な詳細を残す。'],['できるだけ残す','情報の欠落を最小化し、詳細レイヤーに厚く格納。']];
  let h=`<h3>残す情報の程度</h3><div class="muted" style="margin-bottom:10px">手元の分析を、8カテゴリの体系に沿ってAIに整理させます。</div>`;
  opts.forEach(([k,d])=>{ h+=`<div class="card tap" style="${lv===k?'border-color:var(--navy);background:var(--navy-bg)':''}" onclick="DB.askPrefs.level='${k}';save();sheetOrderOrg('${sid}')"><div style="font-size:14px;font-weight:700">${k}</div><div class="muted" style="margin-top:3px">${d}</div></div>`; });
  h+=`<div class="banner" style="margin-top:10px">生成後、この整理プロンプトと一緒に、手元の分析(AIとのチャットログ等)をAIチャットに貼り付けてください。</div>
      <button class="btn pri" style="margin-top:8px" onclick="genOrderOrg('${sid}')">整理プロンプトを生成</button>`;
  openSheet(h);
}

function catOf(su){ const c=DB.sectionMaster.find(x=>x.subs.includes(su)); return c?c.cat:''; }
function genOrderNew(sid){
  const s=stock(sid); const pk=DB.askPrefs.picks||{};
  const sums=Object.keys(pk).filter(k=>pk[k]==='sum'), deeps=Object.keys(pk).filter(k=>pk[k]==='deep');
  const need=[]; DB.metricsMaster.snap.forEach(k=>{const m=s.metrics[k]; if(!m||daysSince(m.d)>30)need.push(k);});
  if(!sums.length&&!deeps.length&&!need.length){ toast('項目を選んでください'); return; }
  const theme=((DB.askPrefs.themes||{})[sid]||'').trim();
  let p=`以下の項目を調査し、指定フォーマットで回答してください。\n`;
  if(theme) p+=`\n■注目テーマ: ${theme}\n各項目は、このテーマとの関連を軸に調べてください。テーマに関係が薄い項目は一般的な内容で構いません。\n`;
  p+=`\n■出力ルール(厳守)\n・回答全体を1つのコードブロックで囲む\n・太字(**)や装飾を使わない。前置き後書き不要\n・各値に 基準日(YYYY/M/D)・出典・確信度(高/中/低) を付す\n・値は数値のみ(「億円」「兆」等の単位や記号を値に含めない)。単位は「単位:◯◯」欄に開示慣行の単位(億円/百万円等)で明記\n・決算期は「yy年mm月期」表記、予想は(予)\n・出典はサイト名のみ(URLやリンク記法は書かない)\n・分割せず1回で出力。量が多い場合も省略せず続けて出力する\n・やむを得ず分割する場合は、各回の先頭に必ず「# 銘柄: ${s.name} (${s.code})」と該当する「## 見出し」を付ける\n\n# 銘柄: ${s.name} (${s.code})\n`;
  if(need.length) p+='\n## 指標\n'+need.map(k=>`- ${k}: `).join('\n');
  p+='\n\n## 業績推移\n直近4期+予想1期(yy年mm月期表記)の '+DB.metricsMaster.trend.map(x=>x.name).join(' / ')+' を年度ごとに。';
  if(sums.length||deeps.length){
    p+='\n\n## 分析\n以下の項目について回答。「サマリ」は2〜3文で簡潔に。「詳細」は深掘りした長文(投資判断に効く具体性=数値・競合比較・持続性を重視)。\n項目名は下記の名称をそのまま使い、カテゴリ名は付けないでください。\n';
    sums.forEach(k=>{ p+=`- ${k}(サマリ): \n`; });
    deeps.forEach(k=>{ p+=`- ${k}(サマリ): \n- ${k}(詳細): \n`; });
  }
  p+='\n\n## 回答フォーマット\n各行「- キー: 値 | 基準日 | 出典 | 確信度」。分析は「- 項目名(サマリ): 本文 | 基準日 | 出典 | 確信度」「- 項目名(詳細): 本文 | 基準日 | 出典 | 確信度」の2種で回答。業績推移「- 指標名: 25年3月期=値 | 26年3月期=値 | 27年3月期(予)=値 | 単位:◯◯ | 基準日 | 出典 | 確信度」';
  showPrompt(p);
}
function genOrderOrg(sid){
  const s=stock(sid); const lv=DB.askPrefs.level||'標準';
  const detail={'要点のみ':'各項目サマリのみ(2〜3文)。詳細は出力しない。','標準':'各項目サマリ(2〜3文)+重要な項目には詳細も出力。','できるだけ残す':'各項目サマリ+詳細を可能な限り厚く。元の情報の欠落を最小化し、数値・固有名詞・根拠を落とさない。'}[lv];
  const cats=DB.sectionMaster.filter(c=>c.on).map(c=>`【${c.cat}】\n`+c.subs.map(su=>`  - ${su}`).join('\n')).join('\n');
  let p=`これから貼り付ける私の分析(AIとのやり取り等)を、下記の体系に沿って整理し直してください。\n\n■粒度: ${lv}\n${detail}\n\n■体系(該当する項目のみ埋める。情報がない項目は出力しない)\n${cats}\n\n■出力ルール(厳守)\n・回答全体を1つのコードブロックで囲む\n・太字(**)や装飾を使わない。前置き後書き不要\n・項目名は上記リストの名称(- の後の名称)のみを使い、カテゴリ名(【】内)は付けない\n  正しい例: - 主要競合(サマリ): 本文\n  誤った例: - 競争環境: 主要競合(サマリ): 本文\n・各行に 基準日(YYYY/M/D)・出典・確信度(高/中/低) を付す。元情報に日付がなければ本日の日付、出典は「手持ち分析」\n\n# 銘柄: ${s.name} (${s.code})\n## 分析\n- 項目名(サマリ): 本文 | 基準日 | 出典 | 確信度\n- 項目名(詳細): 本文 | 基準日 | 出典 | 確信度\n\n--- 以下に私の分析を貼り付けます ---`;
  showPrompt(p);
}
function showPrompt(p){
  openSheet(`<h3>AIへの質問文</h3>
    <textarea class="mono" style="min-height:220px" readonly>${esc(p)}</textarea>
    <button class="btn pri" style="margin-top:10px" onclick='copyOrder(${JSON.stringify(p)})'>質問文をコピーしてAIへ</button>`);
}
function sheetSectionMaster(sid){
  let h='<h3>セクションの管理</h3><div class="muted" style="margin-bottom:10px">大カテゴリの表示/非表示を切り替えます。</div>';
  DB.sectionMaster.forEach((c,i)=>{
    h+=`<div class="row" style="display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid var(--line)">
      <span style="flex:1;font-size:13px">${esc(c.cat)}<div class="muted" style="font-size:10px">${esc(c.subs.join('・'))}</div></span>
      <button class="btn sm" style="width:auto;padding:4px 10px;font-size:11px;${c.on?'background:var(--navy);color:#fff;border-color:var(--navy)':''}" onclick="DB.sectionMaster[${i}].on=!DB.sectionMaster[${i}].on;save();sheetSectionMaster('${sid}')">${c.on?'表示':'非表示'}</button>
    </div>`; });
  h+=`<button class="btn" style="margin-top:12px" onclick="sheetOrderNew('${sid}')">← 戻る</button>`;

}
function copyOrder(p){ copy(p,'質問文をコピーしました。AIに貼り付けて、回答をSTEP2へ'); closeSheet(); if(STATE.tab!=='import') go('import'); else render(); }
const RULES='■出力ルール(厳守)\n・回答全体を1つのコードブロックで囲む\n・太字(**)や装飾を使わない。1キーにつき1行。前置き後書き不要\n・各値に 基準日(YYYY/M/D)・出典・確信度(高/中/低) を付す\n・数値は値のみ、金額は「単位:◯◯」欄に開示慣行の単位で明記。決算期は「yy年mm月期」表記、予想は(予)';
const FMT='## 回答フォーマット\n各行「- キー: 値 | 基準日 | 出典 | 確信度」。深掘り指定の項目は「- キー(詳細): 長文…」の行も追加。業績推移「- 指標名: 25年3月期=値 | 26年3月期=値 | 27年3月期(予)=値 | 単位:◯◯ | 基準日 | 出典 | 確信度」';
function genNewPrompt(sid){
  const s=stock(sid); const picks=DB.askPrefs.picks;
  const chosen=Object.keys(picks).filter(k=>picks[k].on);
  if(!chosen.length){ toast('項目を1つ以上選んでください'); return; }
  // also add missing/stale snapshot metrics
  const snapNeed=DB.metricsMaster.snap.filter(k=>{const m=s.metrics[k];return !m||daysSince(m.d)>30;});
  let p=`以下を調査し、指定フォーマットで回答してください。\n\n${RULES}\n\n# 銘柄: ${s.name} (${s.code})\n`;
  if(snapNeed.length) p+='\n## 指標\n'+snapNeed.map(k=>`- ${k}: `).join('\n')+'\n';
  p+='\n## 業績推移\n直近4期+予想1期(yy年mm月期表記)の '+DB.metricsMaster.trend.map(t=>t.name).join(' / ')+' を年度ごとに。\n';
  p+='\n## 分析\n'+chosen.map(k=>`- ${k}: ${picks[k].deep?'(サマリ+詳細の両方を。詳細は具体的な数値・競合比較・持続性を厚めに)':'(要点を簡潔に)'}`).join('\n');
  p+='\n\n'+FMT;
  DB.askPrefs.picks=picks; save();
  copyOrder(p);
}
function genOrgPrompt(sid){
  const s=stock(sid); const lv=DB.askPrefs.level;
  const cats=DB.sectionMaster.filter(c=>c.on).map(c=>c.cat+'('+c.subs.join('・')+')').join('\n');
  const grain={'要点のみ':'各項目を要点のみ簡潔に。','標準':'各項目のサマリと主要な詳細を残す。','できるだけ残す':'情報の欠落を最小化し、詳細を厚く残す。'}[lv];
  let p=`私がこの後貼り付ける${s.name}(${s.code})の分析を、次の体系に沿って整理し直してください。\n粒度: ${grain}\n\n${RULES}\n\n【整理の体系】\n${cats}\n\n# 銘柄: ${s.name} (${s.code})\n## 分析\n(該当する項目のみ「- サブ項目名: サマリ | 基準日 | 出典 | 確信度」で。厚く残す指定なら「- サブ項目名(詳細): 長文」も)\n\n${FMT}\n\n--- 以下に私の分析を貼り付けます ---`;
  copyOrder(p);
}
function sheetAddReminder(){
  openSheet(`<h3>リマインダー登録</h3>
    <div class="muted" style="margin-bottom:10px">外部AIに設計させる場合は登録用プロンプトをコピーし、回答を貼り付けます。</div>
    <label class="fld"><span class="t">対象銘柄</span><select id="rm_stock">${DB.stocks.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></label>
    <label class="fld"><span class="t">補足メモ(任意)</span><textarea id="rm_memo" placeholder="監視の狙い・保有状況・警戒条件など"></textarea></label>
    <button class="btn" onclick="copyRegPrompt()">登録用プロンプトをコピー</button>
    <label class="fld" style="margin-top:12px"><span class="t">外部AIの出力(md)を貼り付け</span><textarea id="rm_md" class="mono" placeholder="## リマインダー ..."></textarea></label>
    <button class="btn pri" onclick="parseReminder()">解析して登録</button>`);
}
function copyRegPrompt(){
  const sid=$('#rm_stock').value; const s=stock(sid); const memo=$('#rm_memo').value.trim();
  const p=`投資監視リマインダーを設計してください。\n対象: ${s.name} (${s.code})\n補足: ${memo||'なし'}\n\n本アプリで設定可能な項目:\n- 頻度: 毎日/平日/土日/週次/月次/単発\n- 時間: HH:MM(複数可) / 回数上限\n- 頻度変更(最大2・条件は「イベント名 YYYY/M/D になったら」形式で日付必須)\n\n次のmd形式のみで出力(コードブロックで囲む):\n## リマインダー\n- タイトル: \n- コメント: \n- カテゴリ: (テクニカル/報道確認/決算プレビュー/決算レビュー/指標更新/需給確認/マクロ)\n- 頻度: \n- 時間: \n- 回数: \n## 頻度変更1\n- 条件: \n- 変更後頻度: \n- 変更後時間: \n## 実行プロンプト\n(リマインド時に貼る監視指示文)`;
  copy(p,'登録用プロンプトをコピーしました');
}
function parseReminder(){
  const md=$('#rm_md').value; const sid=$('#rm_stock').value;
  if(!md.trim()){toast('mdを貼り付けてください');return;}
  const lines=md.split(/\r?\n/); let block=null; const r={id:'r'+Date.now(),stockId:sid,times:[],changes:[],log:[],paused:false,src:'外部AI',srcDate:fmtToday()}; let cur=null; let promptLines=[]; let inPrompt=false;
  for(let raw of lines){ let line=raw.replace(/\*\*/g,'').trim(); if(!line)continue;
    let m;
    if(m=line.match(/^##\s*(.+)$/)){ block=m[1].trim(); if(/実行プロンプト/.test(block)){inPrompt=true;continue;} if(/頻度変更/.test(block)){cur={};r.changes.push(cur);} inPrompt=false; continue; }
    if(inPrompt){ promptLines.push(raw.trim()); continue; }
    if(line.startsWith('-')){ let b=line.replace(/^-\s*/,''); let km=b.match(/^([^:：]+)[:：]\s*(.*)$/); if(!km)continue; let k=km[1].trim(),val=km[2].trim();
      if(/頻度変更/.test(block||'')&&cur){ if(/条件/.test(k))cur.cond=val; else if(/頻度/.test(k))cur.freq=val; else if(/時間/.test(k))cur.times=val; else if(/回数/.test(k))cur.count=val; }
      else { if(/タイトル/.test(k))r.title=val; else if(/コメント/.test(k))r.comment=val; else if(/カテゴリ/.test(k))r.cat=val; else if(/頻度/.test(k))r.freq=val; else if(/時間/.test(k))r.times=val.split(',').map(x=>x.trim()); else if(/回数/.test(k))r.count=val; }
    }
  }
  r.prompt=promptLines.join('\n').trim();
  // validate freq changes date
  let bad=r.changes.find(c=>c.cond&&!/\d{4}\/\d{1,2}\/\d{1,2}/.test(c.cond));
  if(!r.title){toast('タイトルが解析できません');return;}
  r.nextFire='2026/7/14 '+(r.times[0]||'09:00');
  DB.reminders.push(r); save(); closeSheet(); go('reminder');
  toast(bad?'登録しました(日付なし頻度変更は要確認)':'登録しました');
}

//////////////////// util ////////////////////
function copy(text,msg){ navigator.clipboard?.writeText(text).then(()=>toast(msg||'コピーしました'),()=>{fallbackCopy(text);toast(msg||'コピーしました');}); }
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); }
function copyBrief(){ const rs=DB.reminders.filter(r=>!r.paused&&r.prompt); if(!rs.length){toast('今日のリマインダーはありません');return;} let p='今日の確認事項を番号ごとに回答してください。\n\n'+rs.map((r,i)=>`${i+1}) ${r.title}\n${r.prompt}`).join('\n\n'); copy(p,'モーニングブリーフをコピーしました'); }

// reset for testing
function resetDB(){
  askConfirm({title:'全データを初期化', body:'すべての銘柄・分析・仮説・リマインダーが消え、初期状態に戻ります。\n\nこの操作は取り消せません。必要ならキャンセルして、先にバックアップを書き出してください。', okLabel:'初期化する', danger:true, onOk:()=>{
    DB=seed(); save(); go('home'); toast('初期化しました');
  }});
}

//////////////////// export / import (backup) ////////////////////
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=today();
  a.href=url; a.download=`hypo_tracker_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('バックアップを書き出しました');
}
function importData(input){
  const f=input.files&&input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      if(!obj.stocks||!obj.metricsMaster){ toast('形式が違うファイルです'); return; }
      const n=(obj.stocks||[]).length;
      askConfirm({title:'バックアップを復元', body:`読み込んだバックアップ(銘柄${n}件)で、現在のデータをすべて置き換えます。\n\n現在のデータは失われます。`, okLabel:'復元する', danger:true, onOk:()=>{
        DB=obj; save(); go('home'); toast('バックアップを読み込みました');
      }});
    }catch(e){ toast('ファイルを読み込めませんでした'); }
  };
  r.readAsText(f);
}
function sheetBackup(){
  openSheet(`<h3>バックアップ</h3>
    <div class="muted" style="margin-bottom:12px">端末内のデータを書き出し・読み込みします。機種変更やデータ消失に備えて、ときどき書き出しておくと安心です。</div>
    <button class="btn pri" onclick="exportData()">データを書き出す(バックアップ)</button>
    <label class="btn" style="margin-top:10px;cursor:pointer">データを読み込む(復元)
      <input type="file" accept="application/json,.json" style="display:none" onchange="importData(this)">
    </label>
    <button class="btn danger" style="margin-top:16px" onclick="resetDB()">全データを初期化</button>
    <div class="hint" style="margin-top:10px">書き出したファイルはダウンロードフォルダに保存されます。復元すると現在のデータは上書きされます。</div>`);
}
